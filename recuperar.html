<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Recuperar Senha - Well Cash</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, Helvetica, sans-serif;
    background:linear-gradient(135deg,#004080,#0066cc);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background:white;
    width:100%;
    max-width:420px;
    padding:35px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,.2);
}

.logo{
    text-align:center;
    margin-bottom:25px;
}

.logo h1{
    color:#004080;
}

.logo p{
    color:#666;
    margin-top:5px;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:15px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#004080;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#003366;
}

.msg{
    display:none;
    text-align:center;
    margin-bottom:15px;
    font-weight:bold;
}

.sucesso{
    color:green;
}

.erro{
    color:red;
}

.links{
    margin-top:20px;
    text-align:center;
}

.links a{
    color:#004080;
    text-decoration:none;
    font-weight:bold;
}

.links a:hover{
    text-decoration:underline;
}

</style>

</head>
<body>

<div class="container">

    <div class="logo">
        <h1>🔑 Well Cash</h1>
        <p>Recuperação de Senha</p>
    </div>

    <div id="sucesso" class="msg sucesso"></div>
    <div id="erro" class="msg erro"></div>

    <form id="form-recuperar">

        <input
        type="email"
        id="email"
        placeholder="Digite seu e-mail cadastrado"
        required>

        <button type="submit">
            Recuperar Senha
        </button>

    </form>

    <div class="links">
        <a href="login.html">
            Voltar para o Login
        </a>
    </div>

</div>

<script>

document
.getElementById("form-recuperar")
.addEventListener("submit", function(e){

    e.preventDefault();

    const email =
        document.getElementById("email").value.trim();

    const usuarios =
        JSON.parse(
            localStorage.getItem("usuarios")
        ) || [];

    const usuario =
        usuarios.find(u => u.email === email);

    document.getElementById("sucesso").style.display = "none";
    document.getElementById("erro").style.display = "none";

    if(usuario){

        document.getElementById("sucesso").innerHTML =
        "Conta encontrada! Em um sistema real, um link de recuperação seria enviado para seu e-mail.";

        document.getElementById("sucesso").style.display =
        "block";

    }else{

        document.getElementById("erro").innerHTML =
        "Nenhuma conta encontrada com este e-mail.";

        document.getElementById("erro").style.display =
        "block";

    }

});

</script>

</body>
</html>
